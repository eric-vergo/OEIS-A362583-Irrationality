name = "A362583"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["A362583", "Challenge", "Solution"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "A362583"
# Apache-2.0 headers with a project-specific author line; the strict Mathlib
# header linter would still reject the exact format, so skip it.
leanOptions = { weak.linter.style.header = false }

[[lean_lib]]
name = "Challenge"
# Comparator challenge (see comparator.json): a self-contained restatement of
# the locked claims with `sorry` proofs — sorry *warnings* here are expected
# and by design.  Skip the strict Mathlib header linter.
leanOptions = { weak.linter.style.header = false }

[[lean_lib]]
name = "Solution"
# Comparator solution (see comparator.json): the official proof of the challenge
# theorem Challenge.irrational_ϱ, derived from the A362583 library — no `sorry`,
# no axioms beyond the whitelist.  Only the strict Mathlib header linter is
# skipped, for the same project-specific Apache header format as the other libs.
leanOptions = { weak.linter.style.header = false }
