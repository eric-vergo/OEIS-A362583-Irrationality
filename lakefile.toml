name = "A362583"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["A362583", "Challenge"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "A362583"
# The project is CC0 (public domain); headers use CC0 wording, which the
# Mathlib header linter (expecting its Apache-2.0 phrasing) would reject.
leanOptions = { weak.linter.style.header = false }

[[lean_lib]]
name = "Challenge"
# Comparator challenge (see comparator.json): a self-contained restatement of
# the locked claims with `sorry` proofs — sorry *warnings* here are expected
# and by design.  CC0 headers, so skip the Mathlib header linter.
leanOptions = { weak.linter.style.header = false }
