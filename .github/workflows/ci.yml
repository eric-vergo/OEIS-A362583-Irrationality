name: CI (standard-blueprint)

# `standard-blueprint` branch CI.
#
# This branch demonstrates the A362583 blueprint built on STOCK upstream
# `leanprover/verso-blueprint` (see README banner + site/lakefile.lean). It has
# none of the fork-only trust/comparator surface that `main`'s consolidated
# ci.yml drives, and it deliberately does NOT deploy to GitHub Pages (the served
# flagship site is built from `main`).
#
# So `main`'s ci.yml (build landrun/nanoda + run leanprover/comparator + refresh
# comparator-status.json + build the fork site + deploy Pages) is replaced here
# by a single minimal build-check: set up Lean v4.32.0, restore Mathlib's olean
# cache, build the formalization library the site depends on, then build and
# generate the standard-blueprint site and assert the expected HTML output
# exists. No Pages artifact, no deploy job, no comparator, no commit-back.

on:
  push:
    branches: [standard-blueprint]
  pull_request:
    branches: [standard-blueprint]
  workflow_dispatch:

# Read-only: this workflow never writes back to the repo and never deploys Pages.
permissions:
  contents: read

concurrency:
  group: ci-standard-blueprint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-site:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Check out this repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Installs elan + the v4.32.0 toolchain, restores the Mathlib olean cache,
      # and builds the A362583 library (the site's `require A362583 from ".."`
      # path dependency). elan stays on PATH for the site build below
      # (site/lean-toolchain pins the same v4.32.0).
      - name: Set up Lean and build A362583
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: .
          build-args: "A362583"
          test: false
          lint: false

      # --- Standard-blueprint site build ------------------------------------
      - name: Restore site Lake package cache
        uses: actions/cache@v5
        with:
          path: |
            site/.lake/packages
          key: ${{ runner.os }}-sb-site-packages-v1-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-sb-site-packages-v1-
      - name: Restore site Lean build cache
        uses: actions/cache@v5
        with:
          path: |
            site/.lake/build
          key: ${{ runner.os }}-sb-site-build-v1-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json', 'site/lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-sb-site-build-v1-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json', 'site/lakefile.lean') }}-
            ${{ runner.os }}-sb-site-build-v1-
      - name: Get Mathlib olean cache (site)
        working-directory: site
        run: lake exe cache get || true
      - name: Build and generate the blueprint site
        working-directory: site
        # Upstream verso-blueprint's canonical generation recipe: `vbp build`
        # discovers the `Main.lean` entry point, builds the `Contents` library
        # oleans, and interprets the generator through Lake's Lean wrapper,
        # writing `_out/site/html-multi`.
        run: |
          rm -rf _out/site
          lake exe vbp build
      - name: Check generated output
        working-directory: site
        run: |
          set -euo pipefail
          test -f _out/site/html-multi/index.html
          test -f _out/site/html-multi/-verso-data/blueprint-manifest.json
          count="$(find _out/site/html-multi -type f | wc -l | tr -d ' ')"
          [ "$count" -ge 50 ] || { echo "only $count files generated"; exit 1; }
