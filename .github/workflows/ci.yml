name: CI

# Single do-everything workflow. One `build` job, in order:
#   1. Set up Lean (elan + v4.31.0), restore the Mathlib cache, and build the
#      formalization libraries A362583 + Challenge + Solution (subsumes the old
#      lean_action_ci.yml plain-build check).
#   2. Build the sandbox + verifier binaries (real landrun for Landlock
#      sandboxing, nanoda_bin for the independent second kernel), SHA-pinned
#      and cached, then self-test that Landlock actually confines.
#   3. Run leanprover/comparator: sandboxed (landrun) kernel-replay with BOTH
#      the Lean kernel and the nanoda kernel + axiom-whitelist + statement
#      equality that the Solution module proves the exact Challenge statement
#      Challenge.irrational_ϱ (subsumes the old comparator.yml).
#   4. Refresh comparator/comparator-status.json on disk (status/verified_at/
#      note/run_url/tool_ref) and, on a push to main, commit it back as
#      github-actions[bot].
#   5. Build + generate + gate the blueprint site and upload it as a Pages
#      artifact (subsumes the old site.yml). The comparator's fresh
#      comparator/comparator-status.json is on disk BEFORE the site build,
#      because the site bakes it into its comparator page at elaboration time
#      (verso.blueprint.trust.comparatorStatus = "../comparator/comparator-status.json").
# The `deploy` job then publishes the artifact to GitHub Pages.
#
# create-release.yml stays separate (it fires only on a lean-toolchain bump).

on:
  push:
    branches: [main]
    paths-ignore:
      # The comparator's own status-flip commit must not re-trigger this
      # workflow. The commit-back also uses GITHUB_TOKEN, which does not fire
      # `push:` — this paths-ignore is the belt-and-braces second guard.
      - 'comparator/comparator-status.json'
  pull_request:
  workflow_dispatch:

# contents: write  -> commit comparator-status.json back to main
# pages: write / id-token: write -> deploy to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Serialize per-ref and never cancel in-progress: a cancelled run could
# interrupt the comparator commit-back or a Pages deploy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      # Zouuup/landrun main-branch HEAD (the comparator README requires landrun
      # built from main), resolved 2026-07-16. Bump deliberately; the verifier
      # cache key derives from these SHAs, so a bump forces a rebuild.
      LANDRUN_REF: "5ed4a3db3a4ad930d577215c6b9abaa19df7f99f"
      # ammkrn/nanoda_lib default-branch HEAD (ahead of tag v0.3.2), resolved
      # 2026-07-16.
      NANODA_REF: "f58f2f6d535e189a40fcb02ede8eb95f97a92d37"
    steps:
      - name: Check out this repository (solution + challenge + site)
        uses: actions/checkout@v5
        with:
          # Do NOT leave the write-capable token in .git/config for the whole
          # job (many minutes of third-party build code run here). The
          # commit-back step below authenticates its single push explicitly.
          persist-credentials: false

      - name: Check out leanprover/comparator (toolchain-matched tag)
        uses: actions/checkout@v5
        with:
          repository: leanprover/comparator
          # Toolchain-matched comparator tag. Kept in lockstep with the
          # `.tool_ref` value written into comparator/comparator-status.json by
          # the "Refresh" step below — bump the two together on a toolchain bump.
          ref: v4.31.0
          # Check the tool out as `comparator-tool`, NOT `comparator`: the repo
          # now tracks a `comparator/` directory (Challenge/Solution + JSON), so
          # `path: comparator` would have actions/checkout clobber it.
          path: comparator-tool
          persist-credentials: false

      # --- Sandbox + second-kernel verifier binaries -------------------------
      # Real landrun (Landlock) replaces the tool's fake-landrun.sh no-op shim,
      # and nanoda_bin provides the independent second kernel for
      # enable_nanoda in comparator/comparator.json. Both are SHA-pinned and
      # cached; no restore-keys on purpose — a binary at the wrong SHA must
      # never be silently reused, a miss just rebuilds (~2-3 min).
      - name: Restore verifier binaries (landrun + nanoda)
        id: verifier-cache
        uses: actions/cache@v5
        with:
          path: ~/.verifier-bin
          key: ${{ runner.os }}-verifiers-v1-${{ env.LANDRUN_REF }}-${{ env.NANODA_REF }}

      - name: Build landrun (cache miss only)
        if: steps.verifier-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.verifier-bin"
          # Module path is lowercase (module github.com/zouuup/landrun); the
          # proxy + sumdb verify the module zip and all deps at this exact SHA.
          GOBIN="$HOME/.verifier-bin" go install "github.com/zouuup/landrun/cmd/landrun@${LANDRUN_REF}"

      - name: Build nanoda_bin (cache miss only)
        if: steps.verifier-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.verifier-bin"
          git clone https://github.com/ammkrn/nanoda_lib.git "$RUNNER_TEMP/nanoda_lib"
          git -C "$RUNNER_TEMP/nanoda_lib" checkout --detach "$NANODA_REF"
          # nanoda_lib commits Cargo.lock, so --locked pins the crate graph.
          cargo build --release --locked --manifest-path "$RUNNER_TEMP/nanoda_lib/Cargo.toml"
          install -m 0755 "$RUNNER_TEMP/nanoda_lib/target/release/nanoda_bin" "$HOME/.verifier-bin/nanoda_bin"

      - name: Expose verifier binaries
        run: |
          set -euo pipefail
          test -x "$HOME/.verifier-bin/landrun"
          test -x "$HOME/.verifier-bin/nanoda_bin"
          echo "COMPARATOR_LANDRUN=$HOME/.verifier-bin/landrun" >> "$GITHUB_ENV"
          echo "COMPARATOR_NANODA=$HOME/.verifier-bin/nanoda_bin" >> "$GITHUB_ENV"

      # landrun is invoked with --best-effort, which silently degrades to
      # no-sandbox on a Landlock-less kernel. This step turns that silent
      # degradation into a hard failure: if the canary write is not denied,
      # the runner image regressed and the run must not certify anything.
      - name: Landlock sandbox self-test
        run: |
          set -euo pipefail
          # Positive control: an allowed command must succeed under landrun.
          "$COMPARATOR_LANDRUN" --best-effort --ro / --rw /dev -ldd -add-exec true
          # Negative control: a write outside the allowed paths must be denied.
          if "$COMPARATOR_LANDRUN" --best-effort --ro / --rw /dev -ldd -add-exec touch "$HOME/landlock-canary" 2>/dev/null; then
            echo "landrun failed to block a write outside the allowed paths"
            exit 1
          fi
          test ! -e "$HOME/landlock-canary"

      # Installs elan + the v4.31.0 toolchain, restores the Mathlib olean cache,
      # and builds both formalization libraries. With A362583 fully pre-built,
      # the comparator's sandboxed `lake build` steps are no-ops (the tool
      # README's recommended trust posture), so it only exports the oleans and
      # verifies. elan is left on PATH for the later comparator and site steps
      # (site/lean-toolchain pins the same v4.31.0).
      - name: Set up Lean and build A362583 + Challenge
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: .
          build-args: "A362583 Challenge Solution"
          test: false
          lint: false

      - name: Build the comparator tool and lean4export
        working-directory: comparator-tool
        run: lake build lean4export comparator

      - name: Run comparator
        # COMPARATOR_LANDRUN / COMPARATOR_NANODA come from "Expose verifier
        # binaries" via GITHUB_ENV.
        env:
          COMPARATOR_LEAN4EXPORT: ${{ github.workspace }}/comparator-tool/.lake/packages/lean4export/.lake/build/bin/lean4export
        run: |
          set -euo pipefail
          # Run from the solution repo root so `lake env` supplies A362583's
          # LEAN_PATH (Mathlib et al.) to the comparator and its child `lake`
          # invocations.
          cmd=(lake env "${GITHUB_WORKSPACE}/comparator-tool/.lake/build/bin/comparator" comparator/comparator.json)
          # Best-effort AF_UNIX guard (comparator README): a known landrun
          # escape uses AF_UNIX; systemd-run can mask it. Probe first — hosted
          # runners may lack a user manager session — and degrade to unwrapped
          # (the Landlock sandbox itself is still active either way).
          if timeout 30 systemd-run --user --pipe --wait --collect \
               -p RestrictAddressFamilies=~AF_UNIX -- true >/dev/null 2>&1; then
            echo "systemd-run AF_UNIX guard: active"
            exec systemd-run --user --pipe --wait --collect \
              -p RestrictAddressFamilies=~AF_UNIX \
              --working-directory "$PWD" \
              -E PATH="$PATH" \
              -E COMPARATOR_LANDRUN="$COMPARATOR_LANDRUN" \
              -E COMPARATOR_NANODA="$COMPARATOR_NANODA" \
              -E COMPARATOR_LEAN4EXPORT="$COMPARATOR_LEAN4EXPORT" \
              -- "${cmd[@]}"
          else
            echo "::warning::systemd-run --user unavailable; comparator runs without the AF_UNIX guard (Landlock sandbox still active)"
            "${cmd[@]}"
          fi

      # Resolve a *step-level* deep link to the "Run comparator" step above, so the
      # comparator page's "View CI run" link lands the reader on the kernel replay in
      # the logs, not just the run summary. Best-effort: ANY failure of the API / jq
      # lookup falls back to the run-level URL — this step MUST never fail the job
      # (hence `set -uo pipefail` without `-e`, and `|| true` on every lookup). The
      # resolved URL is exported via $GITHUB_ENV as CI_RUN_URL for the two consumers
      # below: "Refresh comparator-status.json" (writes it into run_url) and
      # "Build Contents" (feeds verso.blueprint.trust.ciRunUrl).
      - name: Resolve CI run deep link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          fallback="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          deep=""
          jobs_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" 2>/dev/null || true)"
          if [ -n "$jobs_json" ]; then
            # The build job is the one containing a step literally named "Run comparator".
            job="$(printf '%s' "$jobs_json" | jq -c 'first(.jobs[] | select(any(.steps[]?; .name == "Run comparator")))' 2>/dev/null || true)"
            if [ -n "$job" ] && [ "$job" != "null" ]; then
              job_id="$(printf '%s' "$job" | jq -r '.id // empty' 2>/dev/null || true)"
              step_no="$(printf '%s' "$job" | jq -r 'first(.steps[]? | select(.name == "Run comparator") | .number) // empty' 2>/dev/null || true)"
              if [ -n "$job_id" ] && [ -n "$step_no" ]; then
                deep="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/job/${job_id}#step:${step_no}:1"
              fi
            fi
          fi
          url="${deep:-$fallback}"
          echo "CI_RUN_URL=$url" >> "$GITHUB_ENV"
          echo "Resolved CI_RUN_URL=$url"

      - name: Refresh comparator-status.json
        run: |
          set -euo pipefail
          # Always refresh the record: status, verified_at, note, run_url, and
          # tool_ref all describe this successful certifying run, so the timestamp
          # matches the linked run. This fresh file is now on disk for the site
          # build below.
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          note="Verified in CI by leanprover/comparator (.github/workflows/ci.yml): the Solution module's proof kernel-checks the exact Challenge statement Challenge.irrational_ϱ, using only the permitted axioms propext, Quot.sound, and Classical.choice. Statement equality, axiom whitelist, Lean-kernel replay, and an independent nanoda-kernel replay all confirmed; the solution builds and exports ran inside a Landlock (landrun) sandbox."
          # Prefer the step-level deep link resolved above; fall back to run-level.
          run_url="${CI_RUN_URL:-${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"
          # tool_ref records the comparator tag used for this run so the blueprint's
          # "reproduce it yourself" section can `git clone --branch <tool_ref>`.
          # It MUST stay in lockstep with the checkout `ref:` above (both are the
          # toolchain-matched comparator tag) — bump the two together.
          jq --arg ts "$ts" --arg note "$note" --arg run_url "$run_url" \
            '.status = "verified" | .verified_at = $ts | .note = $note | .run_url = $run_url | .tool_ref = "v4.31.0"' \
            comparator/comparator-status.json > comparator/comparator-status.json.tmp
          mv comparator/comparator-status.json.tmp comparator/comparator-status.json

      - name: Commit comparator-status.json back to main
        # Only on a real push to main. On PRs/dispatch we keep the refreshed file
        # on disk for the site build but never push. The GITHUB_TOKEN push does
        # not re-fire `push:` (and paths-ignore double-guards it). The token is
        # supplied only to this step's single push (persist-credentials is
        # false on checkout, so nothing lives in .git/config).
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- comparator/comparator-status.json; then
            echo "No change to comparator-status.json; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add comparator/comparator-status.json
          git commit \
            -m "comparator: verified" \
            -m "Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

      # --- Blueprint site build (subsumes site.yml) ---------------------------
      # Only the site's own build dir is cached. The repo-root .lake/build is
      # rebuilt fresh every run by the lean-action step above — restoring a
      # stale copy over it would overlay old oleans on the fresh build (lake's
      # trace checks recover, but it is pure wasted work), so it is deliberately
      # NOT in the cache paths. Key family v2 retires the old archives that
      # still contain a root .lake/build.
      - name: Restore Lake package cache
        uses: actions/cache@v5
        with:
          path: |
            site/.lake/packages
          key: ${{ runner.os }}-site-packages-v1-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-site-packages-v1-
      - name: Restore Lean build caches
        uses: actions/cache@v5
        with:
          path: |
            site/.lake/build
          key: ${{ runner.os }}-site-build-v2-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json', 'site/lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-site-build-v2-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json', 'site/lakefile.lean') }}-
            ${{ runner.os }}-site-build-v2-
      - name: Get Mathlib olean cache (site)
        working-directory: site
        run: lake exe cache get || true
      - name: Build Contents
        working-directory: site
        # `-R` (reconfigure) forces the lakefile to re-elaborate so it re-reads
        # CI_RUN_URL fresh: Lake's config trace keys off the lakefile text hash
        # (+ toolchain/platform), NOT env vars, so a warm-cache run would
        # otherwise splice in a stale run URL. The URL — the step-level deep link
        # resolved by "Resolve CI run deep link" above (via $GITHUB_ENV) — feeds
        # the `verso.blueprint.trust.ciRunUrl` lean option (see site/lakefile.lean),
        # which the comparator page uses as its CI-run link fallback.
        env:
          CI_RUN_URL: ${{ env.CI_RUN_URL }}
        run: lake build Contents -R   # never plain `lake build`: the exe target fails the MD4Lean native link
      - name: Generate site
        working-directory: site
        run: |
          rm -rf _out/site
          lake env lean --run Main.lean --output _out/site
      - name: Gates
        working-directory: site
        run: |
          set -euo pipefail
          test -f _out/site/html-multi/index.html
          test -f _out/site/html-multi/-verso-data/blueprint-manifest.json
          count="$(find _out/site/html-multi -type f | wc -l | tr -d ' ')"
          [ "$count" -ge 50 ] || { echo "only $count files"; exit 1; }
          # NB: use `if grep …; then exit 1; fi` rather than `! grep …`. Under
          # `set -e`, a non-final `!`-inverted command that "fails" (grep found a
          # match) is exempt from -e and does NOT abort — so a `! grep` gate that
          # isn't the last statement silently false-passes. Explicit `if` is safe.
          if grep -RIl 'jsdelivr' _out/site/html-multi; then echo "off-origin: jsdelivr reference(s) found"; exit 1; fi
          if grep -RIEl '<(script[^>]*[[:space:]]src|link[^>]*[[:space:]]href)="https?://' _out/site/html-multi; then echo "off-origin: external script/link asset(s) found"; exit 1; fi
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/_out/site/html-multi

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
