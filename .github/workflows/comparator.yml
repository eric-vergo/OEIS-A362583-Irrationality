name: Comparator

# Runs leanprover/comparator against comparator.json: it elaborates the trusted
# Challenge library and the A362583 solution library in separate environments,
# exports both with lean4export, and certifies (Lean-kernel replay + axiom
# whitelist + statement-declaration equality) that A362583 proves the exact
# Challenge statements
#   - A362583.irrational_x
#   - A362583.raceSum_not_linear
# using only {propext, Quot.sound, Classical.choice}. On success it flips
# comparator-status.json from "configured" to "verified" and commits it back.
#
# Sandboxing: comparator normally runs the Solution build/export inside a landrun
# (Landlock) sandbox, optionally wrapped in `systemd-run`, to protect the checking
# machine from an *adversarial* Solution. Here the Challenge and the Solution are
# both authored in this repo, so there is no adversary to isolate; we use the
# tool's own `scripts/fake-landrun.sh` shim (no sandbox). This does not weaken the
# verification itself — the statement match, axiom whitelist, and kernel replay
# that "verified" attests are performed identically. It only drops the Landlock/Go
# runtime dependency, which makes the job robust on hosted runners.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      # Never re-trigger on the tool's own status-flip commit.
      - 'comparator-status.json'
      # Site-only edits don't affect the formalization/comparator.
      - 'site/**'

# Elevate the default (read-only) GITHUB_TOKEN so the verified status can be
# committed back to main. Allowed for a same-repo (non-fork) workflow.
permissions:
  contents: write

concurrency:
  group: comparator
  cancel-in-progress: false

jobs:
  comparator:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repository (solution + challenge)
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Check out leanprover/comparator (toolchain-matched tag)
        uses: actions/checkout@v5
        with:
          repository: leanprover/comparator
          ref: v4.31.0
          path: comparator

      # Installs elan + the v4.31.0 toolchain, restores the Mathlib cache, and
      # pre-builds both libraries. With the solution fully pre-built, the
      # comparator's own (unsandboxed) `lake build` steps are no-ops, so it only
      # exports the oleans and verifies. elan is left on PATH for later steps.
      - name: Set up Lean and pre-build A362583 + Challenge
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: .
          build-args: "A362583 Challenge"
          test: false
          lint: false

      - name: Build the comparator tool and lean4export
        working-directory: comparator
        run: lake build lean4export comparator

      - name: Run comparator
        env:
          COMPARATOR_LANDRUN: ${{ github.workspace }}/comparator/scripts/fake-landrun.sh
          COMPARATOR_LEAN4EXPORT: ${{ github.workspace }}/comparator/.lake/packages/lean4export/.lake/build/bin/lean4export
        run: |
          set -euo pipefail
          chmod +x "$COMPARATOR_LANDRUN"
          # Run from the solution repo root so `lake env` supplies A362583's
          # LEAN_PATH (Mathlib et al.) to the comparator and its child `lake`
          # invocations.
          lake env "${GITHUB_WORKSPACE}/comparator/.lake/build/bin/comparator" comparator.json

      - name: Flip comparator-status.json to verified and commit
        run: |
          set -euo pipefail
          # Always refresh the record: status, verified_at, note, and run_url all
          # describe the latest successful certifying run, so the timestamp
          # matches the linked run.
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          note="Verified in CI by leanprover/comparator (.github/workflows/comparator.yml): the A362583 library's proofs kernel-check the exact Challenge statements A362583.irrational_x and A362583.raceSum_not_linear, using only the permitted axioms propext, Quot.sound, and Classical.choice. Statement equality, axiom whitelist, and Lean-kernel replay all confirmed."
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          jq --arg ts "$ts" --arg note "$note" --arg run_url "$run_url" \
            '.status = "verified" | .verified_at = $ts | .note = $note | .run_url = $run_url' \
            comparator-status.json > comparator-status.json.tmp
          mv comparator-status.json.tmp comparator-status.json
          if git diff --quiet -- comparator-status.json; then
            echo "No change to comparator-status.json; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add comparator-status.json
          git commit \
            -m "comparator: verified" \
            -m "Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
          git push origin HEAD:main
