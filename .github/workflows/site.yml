name: Blueprint Site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # The comparator pushes comparator-status.json to main with GITHUB_TOKEN,
  # which does NOT fire `push:` workflows — but the status is baked into the
  # site's trust page at build time, so rebuild after each comparator run.
  # No loop: comparator.yml paths-ignores comparator-status.json and this
  # workflow never pushes.
  workflow_run:
    workflows: [Comparator]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake package cache
        uses: actions/cache@v5
        with:
          path: |
            site/.lake/packages
          key: ${{ runner.os }}-site-packages-v1-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-site-packages-v1-
      - name: Restore Lean build caches
        uses: actions/cache@v5
        with:
          path: |
            site/.lake/build
            .lake/build
          key: ${{ runner.os }}-site-build-v1-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json', 'site/lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-site-build-v1-${{ hashFiles('site/lean-toolchain', 'site/lake-manifest.json', 'site/lakefile.lean') }}-
            ${{ runner.os }}-site-build-v1-
      - name: Get Mathlib olean cache
        working-directory: site
        run: lake exe cache get || true
      - name: Build Contents
        working-directory: site
        run: lake build Contents   # never plain `lake build`: the exe target fails the MD4Lean native link
      - name: Generate site
        working-directory: site
        run: |
          rm -rf _out/site
          lake env lean --run Main.lean --output _out/site
      - name: Gates
        working-directory: site
        run: |
          set -euo pipefail
          test -f _out/site/html-multi/index.html
          test -f _out/site/html-multi/-verso-data/blueprint-manifest.json
          count="$(find _out/site/html-multi -type f | wc -l | tr -d ' ')"
          [ "$count" -ge 50 ] || { echo "only $count files"; exit 1; }
          # NB: use `if grep …; then exit 1; fi` rather than `! grep …`. Under
          # `set -e`, a non-final `!`-inverted command that "fails" (grep found a
          # match) is exempt from -e and does NOT abort — so a `! grep` gate that
          # isn't the last statement silently false-passes. Explicit `if` is safe.
          if grep -RIl 'jsdelivr' _out/site/html-multi; then echo "off-origin: jsdelivr reference(s) found"; exit 1; fi
          if grep -RIEl '<(script[^>]*[[:space:]]src|link[^>]*[[:space:]]href)="https?://' _out/site/html-multi; then echo "off-origin: external script/link asset(s) found"; exit 1; fi
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/_out/site/html-multi

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
