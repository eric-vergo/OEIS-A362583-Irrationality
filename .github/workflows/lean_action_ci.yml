name: Lean Action CI

# Plain build check. leanprover/lean-action auto-detects the Mathlib dependency
# and restores the Mathlib olean cache (`lake exe cache get`), so the build is a
# download + a small on-top compile rather than an hours-long Mathlib rebuild.
#
# Site serving (GitHub Pages) is handled outside this repo, so the old
# docgen-action step and the pages / id-token permission stub have been removed.
# `paths-ignore` keeps the comparator's status-only commit from re-triggering a
# full rebuild.

on:
  push:
    paths-ignore:
      - 'comparator-status.json'
      # Site-only edits don't affect the formalization build.
      - 'site/**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
