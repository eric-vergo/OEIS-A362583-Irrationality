name: Create Release

# Manual only. This repository tags releases by hand on a semantic-version
# scheme (v1.0.0, …), so an automatic release fired on every `lean-toolchain`
# bump — which would tag toolchain-versioned releases like `v4.32.0` — is
# clutter that collides with the semver tags. Trigger this from the Actions
# tab (workflow_dispatch) if a lean-release-tag release is ever wanted.
on:
  workflow_dispatch:

jobs:
  lean-release-tag:
    name: Add Lean release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: lean-release-tag action
      uses: leanprover-community/lean-release-tag@v1
      with:
        do-release: true
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
